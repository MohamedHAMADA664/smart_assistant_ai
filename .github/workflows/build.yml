name: Build Flutter APK

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    name: Build APK (Release)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: "stable"
          cache: false

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Show Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Patch device_apps namespace
        run: |
          python3 - <<'PY'
          import pathlib
          import re

          candidates = list(pathlib.Path.home().glob(".pub-cache/hosted/pub.dev/device_apps-*/android/build.gradle"))
          if not candidates:
              raise SystemExit("device_apps build.gradle not found in pub cache")

          target = candidates[0]
          text = target.read_text()

          if 'namespace ' in text:
              print("device_apps namespace already present")
          else:
              text = re.sub(
                  r'android\s*\{',
                  'android {\n    namespace "fr.g123k.deviceapps"',
                  text,
                  count=1,
              )
              target.write_text(text)
              print(f"Patched namespace in: {target}")
          PY

      - name: Show Android build files
        run: |
          echo "===== android/build.gradle.kts ====="
          cat android/build.gradle.kts
          echo
          echo "===== android/settings.gradle.kts ====="
          cat android/settings.gradle.kts
          echo
          echo "===== android/app/build.gradle.kts ====="
          cat android/app/build.gradle.kts
          echo
          echo "===== android/gradle.properties ====="
          cat android/gradle.properties
          echo
          echo "===== android/gradle/wrapper/gradle-wrapper.properties ====="
          cat android/gradle/wrapper/gradle-wrapper.properties

      - name: Flutter clean
        run: flutter clean

      - name: Analyze (non-blocking)
        run: flutter analyze || true

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
