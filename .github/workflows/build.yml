name: Build Flutter APK

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    name: Build APK (Release)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: "stable"
          cache: false

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Patch missing namespaces in Android plugins
        run: |
          python3 - <<'PY'
          import pathlib
          import re

          pub_cache = pathlib.Path.home() / ".pub-cache" / "hosted" / "pub.dev"
          if not pub_cache.exists():
              raise SystemExit("pub cache not found")

          gradle_files = list(pub_cache.glob("*/android/build.gradle"))
          patched = []

          for gradle_file in gradle_files:
              text = gradle_file.read_text(encoding="utf-8", errors="ignore")

              if 'com.android.library' not in text and 'com.android.application' not in text:
                  continue

              if re.search(r'namespace\s+["\']', text):
                  continue

              manifest_file = gradle_file.parent / "src" / "main" / "AndroidManifest.xml"
              namespace_value = None

              if manifest_file.exists():
                  manifest_text = manifest_file.read_text(encoding="utf-8", errors="ignore")
                  match = re.search(r'package="([^"]+)"', manifest_text)
                  if match:
                      namespace_value = match.group(1)

              if not namespace_value:
                  safe_name = gradle_file.parent.parent.name.split("-")[0].replace(".", "_").replace("-", "_")
                  namespace_value = f"patched.{safe_name}"

              new_text, count = re.subn(
                  r'android\s*\{',
                  f'android {{\n    namespace "{namespace_value}"',
                  text,
                  count=1,
              )

              if count > 0:
                  gradle_file.write_text(new_text, encoding="utf-8")
                  patched.append((str(gradle_file), namespace_value))

          print("Patched files:")
          for path, namespace in patched:
              print(f"{path} -> {namespace}")

          print(f"Total patched: {len(patched)}")
          PY

      - name: Flutter clean
        run: flutter clean

      - name: Analyze (non-blocking)
        run: flutter analyze || true

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload Release APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
