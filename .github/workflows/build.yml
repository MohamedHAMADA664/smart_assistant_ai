name: Build Flutter APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
          channel: stable
          cache: true

      - name: Disable analytics
        run: flutter config --no-analytics

      - name: Get dependencies
        run: flutter pub get

      - name: Patch device_apps namespace
        run: |
          FILE="$HOME/.pub-cache/hosted/pub.dev/device_apps-2.2.0/android/build.gradle"
          if [ -f "$FILE" ]; then
            grep -q "namespace" "$FILE" || sed -i "/android {/a\    namespace 'fr.g123k.deviceapps'" "$FILE"
            echo "Patched device_apps build.gradle"
            cat "$FILE"
          else
            echo "device_apps build.gradle not found"
            exit 1
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
