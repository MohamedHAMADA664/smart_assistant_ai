name: Build Flutter APK

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    name: Build APK (Release)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: "stable"
          cache: false

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Show Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Show Android build files
        run: |
          echo "===== android/build.gradle.kts ====="
          cat android/build.gradle.kts
          echo
          echo "===== android/settings.gradle.kts ====="
          cat android/settings.gradle.kts
          echo
          echo "===== android/app/build.gradle.kts ====="
          cat android/app/build.gradle.kts
          echo
          echo "===== android/gradle.properties ====="
          cat android/gradle.properties
          echo
          echo "===== android/gradle/wrapper/gradle-wrapper.properties ====="
          cat android/gradle/wrapper/gradle-wrapper.properties

      - name: Flutter clean
        run: flutter clean

      - name: Analyze (non-blocking)
        run: flutter analyze || true

      - name: Build APK
        run: flutter build apk --release --stacktrace

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
