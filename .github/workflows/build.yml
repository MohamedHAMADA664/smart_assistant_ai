name: Build Flutter APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
          channel: stable
          cache: true

      - name: Disable analytics
        run: flutter config --no-analytics

      - name: Get dependencies
        run: flutter pub get

      - name: Patch old Android plugins
        run: |
          DEVICE_APPS_FILE="$HOME/.pub-cache/hosted/pub.dev/device_apps-2.2.0/android/build.gradle"
          NOTIFICATION_FILE="$HOME/.pub-cache/hosted/pub.dev/notification_listener_service-0.0.3/android/build.gradle"
          PHONE_STATE_FILE="$HOME/.pub-cache/hosted/pub.dev/phone_state-1.0.4/android/build.gradle"

          if [ -f "$DEVICE_APPS_FILE" ]; then
            grep -q "namespace" "$DEVICE_APPS_FILE" || sed -i "/android {/a\    namespace 'fr.g123k.deviceapps'" "$DEVICE_APPS_FILE"
            echo "Patched device_apps build.gradle"
          else
            echo "device_apps build.gradle not found"
            exit 1
          fi

          if [ -f "$NOTIFICATION_FILE" ]; then
            grep -q "namespace" "$NOTIFICATION_FILE" || sed -i "/android {/a\    namespace 'com.shounakmulay.notification_listener_service'" "$NOTIFICATION_FILE"
            echo "Patched notification_listener_service build.gradle"
          else
            echo "notification_listener_service build.gradle not found"
            exit 1
          fi

          if [ -f "$PHONE_STATE_FILE" ]; then
            grep -q "namespace" "$PHONE_STATE_FILE" || sed -i "/android {/a\    namespace 'com.dooboolab.phone_state'" "$PHONE_STATE_FILE"
            echo "Patched phone_state build.gradle"
          else
            echo "phone_state build.gradle not found"
            exit 1
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
